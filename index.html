<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa Estação Verde</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --verde1:#2e7d32;
  --verde2:#66bb6a;
  --verde3:#1b5e20;
  --fundo:#f2f2f2;
  --card:#ffffff;
  --texto:#222;
}
.dark{
  --verde1:#0d3b1e;
  --verde2:#145a32;
  --verde3:#0b2e17;
  --fundo:#121212;
  --card:#1e1e1e;
  --texto:#f5f5f5;
}
body{
  font-family:Arial;
  margin:0;
  background:var(--fundo);
  color:var(--texto);
}
header{
  background:linear-gradient(90deg,var(--verde1),var(--verde2));
  color:white;
  padding:15px;
  text-align:center;
  position:relative;
}
.tema-btn{
  position:absolute;
  right:10px;
  top:15px;
}
.menu{
  display:flex;
  overflow-x:auto;
  background:linear-gradient(90deg,var(--verde3),var(--verde1));
}
.menu button{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}
.container{padding:15px;}
.section{display:none;}
.active{display:block;}
input,button{
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  background:linear-gradient(90deg,var(--verde1),var(--verde2));
  color:white;
  border:none;
}
.card{
  background:var(--card);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}
.total{
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h2>🌿 Caixa Estação Verde</h2>
<button class="tema-btn" onclick="alternarTema()">🌙 Tema</button>
</header>

<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="sistema" style="display:none;">

<div class="menu">
  <button onclick="mostrar('venda')">🛒 Venda</button>
  <button onclick="mostrar('produtos')">📦 Produtos</button>
  <button onclick="mostrar('estoque')">📊 Estoque</button>
  <button onclick="mostrar('historico')">📜 Histórico</button>
  <button onclick="mostrar('caixa')">💰 Caixa</button>
</div>

<div class="container">

<div id="venda" class="section active">
<h3>Venda</h3>
<input id="buscarVenda" placeholder="Buscar produto" oninput="filtrarProdutos()">
<div id="listaVenda"></div>
<h4>Itens</h4>
<div id="itensVenda"></div>
<p class="total">Total: R$ <span id="totalVenda">0.00</span></p>
<button onclick="finalizarVenda()">Finalizar Venda</button>
</div>

<div id="produtos" class="section">
<h3>Cadastrar Produto</h3>
<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor">
<input id="estoqueInput" type="number" placeholder="Estoque">
<button onclick="addProduto()">Salvar</button>
</div>

<div id="estoque" class="section">
<h3>Controle de Estoque</h3>
<div id="listaEstoque"></div>
</div>

<div id="historico" class="section">
<h3>Histórico</h3>
<div id="listaHistorico"></div>
<button onclick="gerarPDF()">📄 Gerar PDF do Dia</button>
</div>

<div id="caixa" class="section">
<h3>Controle de Caixa</h3>
<button onclick="abrirCaixa()">Abrir Caixa</button>
<button onclick="fecharCaixa()">Fechar Caixa</button>
<p id="statusCaixa"></p>
<hr>
<h3>Total Vendido Hoje</h3>
<p class="total">R$ <span id="totalHoje">0.00</span></p>
<hr>
<button onclick="backupAutomatico()">💾 Baixar Backup</button>
</div>

</div>
</div>

<script type="module">

</body>
</html>
