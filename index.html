<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa Estação Verde</title>

<style>
:root{
  --verde1:#2e7d32;
  --verde2:#66bb6a;
  --verde3:#1b5e20;
  --fundo:#f2f2f2;
  --card:#ffffff;
  --texto:#222;
}
.dark{
  --verde1:#0d3b1e;
  --verde2:#145a32;
  --verde3:#0b2e17;
  --fundo:#121212;
  --card:#1e1e1e;
  --texto:#f5f5f5;
}
body{
  font-family:Arial;
  margin:0;
  background:var(--fundo);
  color:var(--texto);
  transition:0.3s;
}
header{
  background:linear-gradient(90deg,var(--verde1),var(--verde2));
  color:white;
  padding:15px;
  text-align:center;
  position:relative;
}
.tema-btn{
  position:absolute;
  right:10px;
  top:15px;
  background:white;
  color:black;
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}
.dark .tema-btn{
  background:#333;
  color:white;
}
.menu{
  display:flex;
  overflow-x:auto;
  background:linear-gradient(90deg,var(--verde3),var(--verde1));
}
.menu button{
  flex:1;
  padding:12px;
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}
.container{padding:15px;}
.section{display:none;}
.active{display:block;}
input,button{
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  background:linear-gradient(90deg,var(--verde1),var(--verde2));
  color:white;
  border:none;
  cursor:pointer;
}
.card{
  background:var(--card);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.total{
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h2>🌿 Caixa Estação Verde</h2>
<button class="tema-btn" onclick="alternarTema()">🌙 Tema</button>
</header>

<input type="password" id="senha" placeholder="Senha">
<button onclick="login()">Entrar</button>

<div id="sistema" style="display:none;">

<div class="menu">
  <button onclick="mostrar('venda')">🛒 Venda</button>
  <button onclick="mostrar('produtos')">📦 Produtos</button>
  <button onclick="mostrar('estoque')">📊 Estoque</button>
  <button onclick="mostrar('historico')">📜 Histórico</button>
  <button onclick="mostrar('caixa')">💰 Caixa</button>
</div>

<div class="container">

<div id="venda" class="section active">
<h3>Venda</h3>
<input id="buscarVenda" placeholder="Buscar produto" oninput="filtrarProdutos()">
<div id="listaVenda"></div>
<h4>Itens</h4>
<div id="itensVenda"></div>
<p class="total">Total: R$ <span id="totalVenda">0.00</span></p>
<button onclick="finalizarVenda()">Finalizar Venda</button>
</div>

<div id="produtos" class="section">
<h3>Cadastrar Produto</h3>
<input id="nome" placeholder="Nome">
<input id="valor" type="number" placeholder="Valor">
<input id="estoqueInput" type="number" placeholder="Estoque">
<button onclick="addProduto()">Salvar</button>
</div>

<div id="estoque" class="section">
<h3>Controle de Estoque</h3>
<div id="listaEstoque"></div>
</div>

<div id="historico" class="section">
<h3>Histórico</h3>
<div id="listaHistorico"></div>
</div>

<div id="caixa" class="section">
<h3>Controle de Caixa</h3>
<button onclick="abrirCaixa()">Abrir Caixa</button>
<button onclick="fecharCaixa()">Fechar Caixa</button>
<p id="statusCaixa"></p>
<hr>
<h3>Total Vendido Hoje</h3>
<p class="total">R$ <span id="totalHoje">0.00</span></p>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCX68TreUoB6XMSrXQ73CYzCJRQMebBB-g",
  authDomain: "caixaverdee-d52dc.firebaseapp.com",
  projectId: "caixaverdee-d52dc",
  storageBucket: "caixaverdee-d52dc.firebasestorage.app",
  messagingSenderId: "208791321789",
  appId: "1:208791321789:web:b54b11053c44afed5c8bd4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let caixaAberto=false;
let total=0;
let itens=[];
let produtos=[];

window.login=function(){
 if(senha.value==="2020"){
  sistema.style.display="block";
 } else alert("Senha incorreta");
}

window.mostrar=function(sec){
 document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
 document.getElementById(sec).classList.add("active");
}

window.addProduto=async function(){
 if(!nome.value || !valor.value || !estoqueInput.value){
   alert("Preencha todos os campos");
   return;
 }

 await addDoc(collection(db,"produtos"),{
  nome:nome.value,
  valor:parseFloat(valor.value),
  estoque:parseInt(estoqueInput.value)
 });

 nome.value="";
 valor.value="";
 estoqueInput.value="";
}

onSnapshot(collection(db,"produtos"),(snap)=>{
 produtos=[];
 listaEstoque.innerHTML="";
 snap.forEach(d=>{
  let p={id:d.id,...d.data()};
  produtos.push(p);

  listaEstoque.innerHTML+=`
   <div class="card">
   <b>${p.nome}</b><br>
   Estoque: ${p.estoque}<br><br>
   <button onclick="alterar('${p.id}',${p.estoque+1})">➕</button>
   <button onclick="alterar('${p.id}',${p.estoque-1})">➖</button>
   <button onclick="removerProduto('${p.id}')">🗑 Excluir</button>
   </div>
  `;
 });
});

window.removerProduto = async function(id){
 if(confirm("Tem certeza que deseja excluir este produto?")){
   await deleteDoc(doc(db,"produtos",id));
   alert("Produto removido com sucesso");
 }
}

window.filtrarProdutos=function(){
 let texto=buscarVenda.value.toLowerCase();
 listaVenda.innerHTML="";
 if(texto==="") return;

 produtos
 .filter(p=>p.nome.toLowerCase().includes(texto))
 .forEach(p=>{
  listaVenda.innerHTML+=`
   <div class="card">
   ${p.nome} - R$ ${p.valor} | Estoque: ${p.estoque}
   <br>
   Qtd:
   <input type="number" min="1" value="1" id="qtd_${p.id}">
   <button onclick="vender('${p.id}')">Adicionar</button>
   </div>
  `;
 });
}

window.vender=async function(id){
 if(!caixaAberto){alert("Abra o caixa");return;}

 let produto=produtos.find(p=>p.id===id);
 let qtd=parseInt(document.getElementById("qtd_"+id).value);

 if(qtd<=0)return;
 if(produto.estoque<qtd){alert("Estoque insuficiente");return;}

 await updateDoc(doc(db,"produtos",id),{
  estoque:produto.estoque-qtd
 });

 let existente=itens.find(i=>i.id===id);
 if(existente){
  existente.quantidade+=qtd;
 }else{
  itens.push({
   id:id,
   nome:produto.nome,
   valor:produto.valor,
   quantidade:qtd
  });
 }

 atualizar();
}

function atualizar(){
 total=0;
 itensVenda.innerHTML="";
 itens.forEach((i,index)=>{
  let subtotal=i.valor*i.quantidade;
  total+=subtotal;

  itensVenda.innerHTML+=`
   <div class="card">
   ${i.nome}<br>
   ${i.quantidade} x R$ ${i.valor} = R$ ${subtotal.toFixed(2)}
   <button onclick="remover(${index})">❌</button>
   </div>
  `;
 });

 totalVenda.innerText=total.toFixed(2);
}

window.remover=async function(index){
 let item=itens[index];
 let produto=produtos.find(p=>p.id===item.id);

 await updateDoc(doc(db,"produtos",item.id),{
  estoque:produto.estoque+item.quantidade
 });

 itens.splice(index,1);
 atualizar();
}

window.finalizarVenda=async function(){
 if(total===0)return;

 await addDoc(collection(db,"vendas"),{
  total:total,
  data:new Date(),
  dataTexto:new Date().toLocaleString()
 });

 total=0;
 itens=[];
 atualizar();
 alert("Venda Finalizada");
}

onSnapshot(collection(db,"vendas"),(snap)=>{
 listaHistorico.innerHTML="";
 let hoje=new Date().toDateString();
 let totalHojeValor=0;

 snap.forEach(v=>{
  let d=v.data();
  let dataVenda=new Date(d.data);

  if(dataVenda.toDateString()===hoje){
   totalHojeValor+=d.total;
  }

  listaHistorico.innerHTML+=`
   <div class="card">
   ${d.dataTexto}<br>Total: R$ ${d.total.toFixed(2)}
   </div>
  `;
 });

 totalHoje.innerText=totalHojeValor.toFixed(2);
});

window.alterar=async function(id,novo){
 if(novo<0)return;
 await updateDoc(doc(db,"produtos",id),{estoque:novo});
}

window.abrirCaixa=function(){
 caixaAberto=true;
 statusCaixa.innerText="Caixa Aberto";
}

window.fecharCaixa=function(){
 caixaAberto=false;
 statusCaixa.innerText="Caixa Fechado";
}

window.alternarTema=function(){
 document.body.classList.toggle("dark");
 if(document.body.classList.contains("dark")){
  localStorage.setItem("tema","dark");
 }else{
  localStorage.setItem("tema","light");
 }
}

if(localStorage.getItem("tema")==="dark"){
 document.body.classList.add("dark");
}
</script>

</body>
</html>
